name: Assemble jre
on: workflow_dispatch

jobs:
  assemble-jre:
    runs-on: ubuntu-latest
    steps:
      - name: Downloading debian packages
        run: |
          echo "=== Downloading debian packages ==="
          echo
          wget -nv https://snapshot.debian.org/archive/debian/20170518T093838Z/pool/main/o/openjdk-6/openjdk-6-jre_6b41-1.13.13-1_armel.deb -O openjdk-jre.deb
          wget -nv https://snapshot.debian.org/archive/debian/20170518T093838Z/pool/main/o/openjdk-6/openjdk-6-jre-headless_6b41-1.13.13-1_armel.deb -O openjdk-jre-headless.deb
          wget -nv https://snapshot.debian.org/archive/debian/20170518T034509Z/pool/main/o/openjdk-6/openjdk-6-jre-lib_6b41-1.13.13-1_all.deb -O openjdk-jre-lib.deb   
          wget -nv https://snapshot.debian.org/archive/debian/20180227T161438Z/pool/main/j/java-atk-wrapper/libatk-wrapper-java_0.33.3-20_all.deb -O libatk-wrapper-java.deb
          wget -nv https://snapshot.debian.org/archive/debian/20180227T161438Z/pool/main/j/java-atk-wrapper/libatk-wrapper-java-jni_0.33.3-20_armel.deb -O libatk-wrapper-java-jni.deb
          wget -nv https://snapshot.debian.org/archive/debian/20251014T150515Z/pool/main/m/media-types/media-types_14.0.0_all.deb -O media-types.deb
          wget -nv https://snapshot.debian.org/archive/debian/20260312T142611Z/pool/main/c/ca-certificates-java/ca-certificates-java_20260311_all.deb -O ca-certificates-java.deb

      - name: Downloading debian packages
        run: |    
          echo "=== Unpack debian packages ==="
          echo
          dpkg -x openjdk-jre.deb openjdk-jre
          dpkg -x openjdk-jre-headless.deb openjdk-jre-headless
          dpkg -x openjdk-jre-lib.deb openjdk-jre-lib
          dpkg -x libatk-wrapper-java.deb libatk-wrapper-java
          dpkg -x libatk-wrapper-java-jni.deb libatk-wrapper-java-jni
          dpkg -x media-types.deb media-types
          dpkg -x ca-certificates-java.deb ca-certificates-java

      - name: Remove debian packages
        run: |    
          echo "=== Remove debian packages ==="
          echo
          rm *.deb
          echo

      - name: Copiing files and remove useless folders
        run: |    
          echo "=== Copiing files and remove useless folders ==="
          echo
          
          cp -r openjdk-jre-headless/* openjdk-jre/
          rm -rf openjdk-jre-headless
          
          rm openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/cmm
          cp --remove-destination -r openjdk-jre-lib/usr/lib/jvm/java-6-openjdk-common/jre/* openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre
          rm -rf openjdk-jre-lib
          
          cp --remove-destination openjdk-jre/etc/java-6-openjdk/jvm-armel.cfg openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/arm/jvm.cfg
          cp --remove-destination openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/arm/libjsig.so openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/arm/server/libjsig.so
          
          cp --remove-destination -r openjdk-jre/etc/java-6-openjdk/* openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib
          
          cp --remove-destination libatk-wrapper-java/usr/share/java/java-atk-wrapper.jar openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/ext
          rm -rf libatk-wrapper-java
          
          cp --remove-destination libatk-wrapper-java-jni/usr/lib/arm-linux-gnueabi/jni/libatk-wrapper.so.6.0.0 openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/ext/libatk-wrapper.so
          rm -rf libatk-wrapper-java-jni
          
          cp --remove-destination media-types/etc/mime.types openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib
          rm -rf media-types
          cp --remove-destination ca-certificates-java/etc/default/cacerts openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/lib/security
          rm -rf ca-certificates-java
          
          rm -rf openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre/man/ja_JP.eucJP
          
          cp -r openjdk-jre/usr/lib/jvm/java-6-openjdk-armel/jre jre
          rm -rf openjdk-jre
          
          du -d 2 -h jre

      - name: Compress
        run: |    
          zip -r jre.zip jre
          du -h jre.zip

      - name: Upload binaries
        uses: skx/github-action-publish-binaries@v0.14
        with:
          args: 'jre.zip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create jre release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.action_ref }} \
              --title "Release for jre ${{ github.action_ref }}" \
